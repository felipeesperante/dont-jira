openapi: 3.0.3
info:
  title: Dont Jira API
  version: 0.1.0
  description: |
    Contrato da API para gestão de projetos e tarefas em árvore (Epic/Tarefa/Subtarefa).
    Este contrato foi derivado das entidades Java e regras de negócio atuais do backend.
servers:
  - url: http://localhost:8080
    description: Ambiente local

tags:
  - name: Users
  - name: Projects
  - name: Membership
  - name: Work Items

paths:
  /api/users:
    post:
      tags: [Users]
      summary: Criar conta de usuário
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccount'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/projects:
    post:
      tags: [Projects]
      summary: Criar projeto
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Projeto criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/projects/{projectId}/membership-requests:
    post:
      tags: [Membership]
      summary: Solicitar participação em projeto
      operationId: requestMembership
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '202':
          description: Solicitação registrada
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/projects/{projectId}/members:
    post:
      tags: [Membership]
      summary: Adicionar membro aprovado ao projeto
      operationId: addMember
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Membro adicionado
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/projects/{projectId}/work-items:
    get:
      tags: [Work Items]
      summary: Listar itens de trabalho de um projeto (árvore)
      operationId: listWorkItemsByProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Itens de trabalho retornados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkItem'
    post:
      tags: [Work Items]
      summary: Criar item de trabalho (Epic, Task ou Subtask)
      operationId: createWorkItem
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkItemRequest'
      responses:
        '201':
          description: Item de trabalho criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/work-items/{workItemId}:
    patch:
      tags: [Work Items]
      summary: Atualizar título/descrição de item de trabalho
      operationId: updateWorkItem
      parameters:
        - name: workItemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkItemRequest'
      responses:
        '200':
          description: Item atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Work Items]
      summary: Excluir item de trabalho
      operationId: deleteWorkItem
      parameters:
        - name: workItemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Item removido
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    UnprocessableEntity:
      description: Erro de regra de negócio/validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    UserAccount:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72

    Project:
      type: object
      required: [id, name, description, createdByUserId]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          minLength: 1
          maxLength: 3000
        plannedStartDate:
          type: string
          format: date
          nullable: true
        plannedEndDate:
          type: string
          format: date
          nullable: true
        createdByUserId:
          type: integer
          format: int64

    CreateProjectRequest:
      type: object
      required: [creatorUserId, name, description]
      properties:
        creatorUserId:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          minLength: 1
          maxLength: 3000
        plannedStartDate:
          type: string
          format: date
          nullable: true
        plannedEndDate:
          type: string
          format: date
          nullable: true

    MembershipStatus:
      type: string
      enum: [REQUESTED, APPROVED]

    ProjectMembership:
      type: object
      required: [id, projectId, userId, status, createdAt]
      properties:
        id:
          type: integer
          format: int64
        projectId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/MembershipStatus'
        createdAt:
          type: string
          format: date-time

    WorkItemType:
      type: string
      enum: [EPIC, TASK, SUBTASK]

    WorkItem:
      type: object
      required: [id, projectId, type, title]
      properties:
        id:
          type: integer
          format: int64
        projectId:
          type: integer
          format: int64
        parentItemId:
          type: integer
          format: int64
          nullable: true
        type:
          $ref: '#/components/schemas/WorkItemType'
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 3000
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateWorkItemRequest:
      type: object
      required: [type, title]
      properties:
        parentItemId:
          type: integer
          format: int64
          nullable: true
        type:
          $ref: '#/components/schemas/WorkItemType'
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 3000
          nullable: true

    UpdateWorkItemRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 3000
          nullable: true
